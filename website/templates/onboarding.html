<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Get Started · Blueprint</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/onboarding.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/footer.css') }}"
    />
  </head>

  <body>
    <header class="ob-header">
      <a href="{{ url_for('homepage.homepage') }}" class="ob-logo-link">
        <img
          src="{{ url_for('static', filename='img/logo.png') }}"
          alt="Blueprint"
          class="ob-logo-img"
        />
      </a>
    </header>

    <main class="ob-main">
      <form method="POST" action="{{ url_for('homepage.submit_info') }}">
        <div class="ob-intro">
          <h1 class="ob-page-title">Let's build your roadmap</h1>
          <p class="ob-page-sub">
            Five quick questions to personalise your path.
          </p>
        </div>

        {% for q in questions %}
        <section class="ob-section">
          <p class="ob-q-num">{{ '%02d' | format(loop.index) }}</p>
          <h2 class="ob-q-title">{{ q.title }}</h2>
          <div class="ob-options ob-options--{{ q.layout }}">
            {% for opt in q.options %}
            <label class="ob-card">
              <input
                type="radio"
                name="{{ q.name }}"
                value="{{ opt.key }}"
                {% if loop.first %}required{% endif %}
              />
              <span class="ob-card-inner">
                <span class="ob-card-title">{{ opt.label }}</span>
                {% if opt.subtitle is defined and opt.subtitle %}
                <span class="ob-card-sub">{{ opt.subtitle }}</span>
                {% endif %}
              </span>
            </label>
            {% endfor %}
          </div>
        </section>
        {% endfor %}

        <div class="ob-footer">
          <button type="submit" class="ob-btn-submit">Find My Roadmap</button>
        </div>
      </form>
    </main>

    <!-- Loading overlay  -->
    <div class="ob-loading" id="obLoading" aria-hidden="true">
      <div class="ob-loading-inner">
        <div class="ob-loading-logo">
          <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Blueprint" />
        </div>
        <div class="ob-loading-spinner">
          <span></span><span></span><span></span>
        </div>
        <p class="ob-loading-msg" id="obLoadingMsg">Building your roadmap…</p>
      </div>
    </div>

    <script src="{{ url_for('static', filename='js/onboarding.js') }}" defer></script>

    {% include 'footer.html' %}
  </body>
</html>
